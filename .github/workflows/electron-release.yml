# Builds installable POS desktop artifacts for macOS (.dmg) and Windows (.exe NSIS).
# Run manually from Actions, or push a git tag matching v* (e.g. v1.3.0).
# On tag pushes, installers are also attached to the GitHub Release for that tag.
name: Electron release build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# Required so the release job can upload DMG/EXE to the GitHub Release (same repo).
permissions:
  contents: write

jobs:
  build-macos:
    name: macOS (DMG)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install, verify web build, package app
        run: |
          npm ci
          npm run verify
          npm run electron:build:mac

      - uses: actions/upload-artifact@v4
        with:
          name: billing-solution-macos
          path: release/*.dmg
          if-no-files-found: error

  build-windows:
    name: Windows (NSIS)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install, verify web build, package app
        shell: bash
        run: |
          npm ci
          npm run verify
          npm run electron:build:win

      - uses: actions/upload-artifact@v4
        with:
          name: billing-solution-windows
          path: release/*.exe
          if-no-files-found: error

  # DMG/EXE live under Actions → workflow run → Artifacts by default.
  # This job copies them onto the GitHub Release page (same tag).
  github-release:
    name: Upload installers to GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: billing-solution-*
          merge-multiple: true
          path: installers

      - name: Attach DMG and EXE to release ${{ github.ref_name }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            installers/*.dmg
            installers/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
